name: Publish the packages as the alpha version
run-name: Publish as the alpha version by @${{ github.actor }}
on:
  workflow_dispatch:
permissions:
  contents: write
  packages: write
jobs:
  build:
    uses: ./.github/workflows/common-release.yml
    with:
      next: true
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
